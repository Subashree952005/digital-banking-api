services:

  api-gateway:
    build: ./api-gateway
    container_name: banking_gateway
    ports:
      - "9000:9000"
    env_file:
      - ./api-gateway/.env.docker
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    container_name: banking_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:admin123@postgres:5432/bankdb
      SECRET_KEY: banking-app-secret-key-2024-do-not-share-ever
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: banking_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bankdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bankdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: